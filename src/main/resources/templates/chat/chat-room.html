<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ChatTech - Smart Room</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .chat-box { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 15px; background-color: #f9f9f9; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 8px; max-width: 80%; }
        .msg-user { background-color: #d1ecf1; margin-left: auto; text-align: right; }
        .msg-bot { background-color: #d4edda; margin-right: auto; }
        .msg-typing { background-color: #eeeeee; color: #555; margin-right: auto; font-style: italic; }
        .sender { font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 4px; }
        .input-area { margin-top: 15px; display: flex; gap: 10px; }
        input[type="text"] { padding: 10px; flex-grow: 1; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<h1>AI Assisted Chat Room</h1>

<div id="chat-box" class="chat-box">
    <div th:each="message : ${messages}"
         th:classappend="${message.sender == 'LibroBot IA'} ? 'msg msg-bot' : 'msg msg-user'">
        <span class="sender" th:text="${message.sender}">User</span>
        <span th:text="${message.content}">Message text</span>
    </div>
</div>

<div class="input-area">
    <input type="text" id="sender" placeholder="Your name..." style="flex-grow: 0; width: 150px;" required>
    <input type="text" id="message" placeholder="Write a message to the AI or other users..." required>
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    var stompClient = null;

    function connect() {
        var socket = new SockJS('/chat-websocket');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function () {
            stompClient.subscribe('/tema/mensajes', function (response) {
                var message = JSON.parse(response.body);
                if (message.sender === 'LibroBot IA') {
                    hideTypingMessage();
                }
                showMessage(message);
            });
        });
    }

    function sendMessage() {
        var sender = document.getElementById('sender').value;
        var content = document.getElementById('message').value;
        if (content.trim() === '') return;

        stompClient.send("/app/enviar", {}, JSON.stringify({'sender': sender, 'content': content}));
        document.getElementById('message').value = '';
        showTypingMessage();
    }

    function showMessage(message) {
        var chatBox = document.getElementById('chat-box');
        var newMessage = document.createElement('div');
        var messageClass = (message.sender === 'LibroBot IA') ? 'msg msg-bot' : 'msg msg-user';

        newMessage.className = messageClass;
        newMessage.innerHTML = "<span class='sender'>" + message.sender + "</span> <span>" + message.content + "</span>";
        chatBox.appendChild(newMessage);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTypingMessage() {
        hideTypingMessage();

        var chatBox = document.getElementById('chat-box');
        var typingMessage = document.createElement('div');

        typingMessage.id = 'typing-message';
        typingMessage.className = 'msg msg-typing';
        typingMessage.innerHTML = "<span class='sender'></span> <span>...</span>";
        chatBox.appendChild(typingMessage);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function hideTypingMessage() {
        var typingMessage = document.getElementById('typing-message');
        if (typingMessage) {
            typingMessage.remove();
        }
    }

    window.onload = connect;
</script>
</body>
</html>
