<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${tituloPantalla}">Formulario</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            padding: 8px;
            width: 300px;
        }

        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        .btn-cancel {
            background-color: #f44336;
            text-decoration: none;
            display: inline-block;
            padding: 10px 15px;
            color: white;
        }
    </style>
</head>
<body>

<!-- th:replace="ruta/archivo :: nombreFragmento" -->
<div th:replace="~{layout/components :: navbar}"></div>

<h1 th:text="${tituloPantalla}">Nuevo Libro</h1>

<!-- Bloque de error visual -->
<div th:if="${yearError}" style="background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
    <strong th:text="${yearError}">Mensaje de error genérico</strong>
</div>

<!-- El formulario se vincula al objeto 'libro' enviado desde el controlador -->
<form th:action="@{/admin/books/save}" th:object="${book}" method="post">

    <div class="form-group">
        <label for="title">Título del Libro:</label>
        <!-- th:field se encarga del id, name y value -->
        <input type="text" th:field="*{title}" required/>
    </div>

    <div class="form-group">
        <label for="author">Autor:</label>
        <input type="text" th:field="*{author}" required/>
    </div>

    <div class="form-group">
        <label for="isbn">ISBN:</label>
        <input type="text" th:field="*{isbn}" required/>
    </div>

    <div class="form-group">
        <label for="publicationYear">Año de Publicación:</label>
        <input type="number" th:field="*{publicationYear}" required/>
    </div>

    <button type="submit">Guardar Libro</button>
    <!-- th:href genera rutas relativas al contexto de la app -->
    <a th:href="@{/admin/books}" class="btn-cancel">Cancelar</a>

</form>

<div th:replace="~{layout/components :: footer}"></div>
</body>
</html>
