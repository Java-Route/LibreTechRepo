<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${tituloPantalla}">Catálogo Estático</title>
    <!-- Estilos básicos embebidos para el laboratorio -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            color: #1f2937;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }


        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .empty-state {
            color: #888;
            font-style: italic;
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-top: 20px;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #f9fafb;
        }

        .pagination-info {
            color: #4b5563;
            font-size: 14px;
        }

        .pagination-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pagination-button {
            display: inline-block;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #ffffff;
            color: #111827;
            text-decoration: none;
            font-size: 14px;
        }

        .pagination-button:hover {
            background: #eef2ff;
            border-color: #6366f1;
            color: #3730a3;
        }

        .pagination-button.disabled {
            color: #9ca3af;
            background: #f3f4f6;
            cursor: not-allowed;
        }

        .pagination-current {
            min-width: 90px;
            text-align: center;
            color: #374151;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- th:replace="ruta/archivo :: nombreFragmento" -->
<div th:replace="~{layout/components :: navbar}"></div>

<h1 th:text="${screenTitle}">Lista de Libros</h1>


<!-- Agregue esta línea debajo del H1 -->
<div style="margin-bottom: 20px;">
    <a th:href="@{/admin/books/new}"
       style="padding: 10px; background-color: #008CBA; color: white; text-decoration: none;">+ Agregar Nuevo Libro</a>
</div>

<!-- th:if evalúa si la lista está vacía -->
<div th:if="${#lists.isEmpty(books.content)}" class="empty-state">
    <p>No hay libros registrados en el sistema actualmente.</p>
</div>

<!-- th:unless es lo opuesto a th:if (si NO está vacía) -->
<table th:unless="${#lists.isEmpty(books.content)}">
    <thead>
    <tr>
        <th>ID</th>
        <th>Título</th>
        <th>Autor</th>
        <th>ISBN</th>
        <th>Año</th>
    </tr>
    </thead>
    <tbody>
    <!-- th:each itera sobre la colección ${libros} -->
    <tr th:each="libro : ${books.content}">
        <td th:text="${libro.id}">1</td>
        <td th:text="${libro.title}">El Quijote</td>
        <td th:text="${libro.author}">Cervantes</td>
        <td th:text="${libro.isbn}">123-456</td>
        <td th:text="${libro.publicationYear}">1605</td>
    </tr>
    </tbody>
</table>
<div class="pagination" th:if="${!books.isEmpty()}">
    <span class="pagination-info"
          th:text="'Registros ' + ${books.number * books.size} + '-' + ${books.number * books.size + books.numberOfElements} + ' de ' + ${books.totalElements}">
        Registros 0-2 de 7
    </span>

    <div class="pagination-controls">
        <a class="pagination-button"
           th:if="${books.hasPrevious()}"
           th:href="@{/admin/books(page=${books.number - 1}, size=${books.size})}">
            Anterior
        </a>
        <span class="pagination-button disabled" th:unless="${books.hasPrevious()}">
            Anterior
        </span>

        <span class="pagination-current"
              th:text="'Página ' + ${books.number + 1} + ' de ' + ${books.totalPages}">
            Página 1 de 4
        </span>

        <a class="pagination-button"
           th:if="${books.hasNext()}"
           th:href="@{/admin/books(page=${books.number + 1}, size=${books.size})}">
            Siguiente
        </a>
        <span class="pagination-button disabled" th:unless="${books.hasNext()}">
            Siguiente
        </span>
    </div>
</div>

<div th:replace="~{layout/components :: footer}"></div>
</body>
</html>
